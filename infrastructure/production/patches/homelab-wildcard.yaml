---
# SAN cert for all .homelab services — stored in kube-system so Traefik's
# TLSStore can use it as the default certificate.
# *.homelab (2-label wildcard) is rejected by Chromium; explicit SANs required.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-wildcard
  namespace: kube-system
spec:
  secretName: homelab-wildcard-tls
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - bazarr.homelab
    - grafana.homelab
    - immich.homelab
    - jellyfin.homelab
    - jellyseer.homelab
    - longhorn.homelab
    - n8n.homelab
    - notifiarr.homelab
    - prowlarr.homelab
    - qbittorrent.homelab
    - radarr.homelab
    - sabnzbd.homelab
    - sonarr.homelab
    - tracearr.homelab
    - vault.homelab
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
