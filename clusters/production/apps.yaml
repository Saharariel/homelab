apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: controllers
    # apps substitutes ${BASE_PATH}/${NFS_SERVER}/${NFS_ROOT}; Ansible creates
    # base-path for bootstrap and infra keeps the Git-managed copy reconciled.
    - name: infra
  path: ./apps/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-params
      - kind: Secret
        name: base-path
