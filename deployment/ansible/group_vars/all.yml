---
# Versions (pin these; bump deliberately)
k3s_version: "v1.31.5+k3s1"
cilium_version: "1.17.1"

# Networking
pod_cidr: "10.42.0.0/16"        # k3s default; must match Cilium ipam pool
service_cidr: "10.43.0.0/16"

# Control-plane API endpoint (the master IP) — Cilium needs this with no kube-proxy.
k3s_apiserver_host: "192.168.50.19"
k3s_apiserver_port: 6443

# Flux bootstrap target (this repo)
flux_git_url: "https://github.com/Saharariel/homelab.git"
flux_git_branch: "main"
flux_git_path: "clusters/production"

# ---- Secrets: keep in an ansible-vault'd group_vars/secrets.yml (gitignored) ----
# k3s_token: "<cluster join token>"
# eso_bootstrap: { ... }   # the AWS/Infisical secret-zero injected at bootstrap
