---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - qemu-guest-agent   # so Proxmox/Terraform see the VM's IP + can manage it
      - nfs-common         # REQUIRED: all PVs are NFS; kubelet mounts them per-pod
      - curl
      - open-iscsi
    state: present

- name: Enable qemu-guest-agent
  ansible.builtin.systemd:
    name: qemu-guest-agent
    enabled: true
    state: started

- name: Disable swap (kubelet requirement)
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Remove swap from fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1'

- name: Kernel modules for the container/eBPF datapath
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s-cilium.conf
    content: |
      overlay
      br_netfilter
    mode: "0644"

- name: Sysctls for k8s networking
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: true
    reload: true
  loop:
    - { name: net.bridge.bridge-nf-call-iptables, value: "1" }
    - { name: net.ipv4.ip_forward, value: "1" }
    - { name: net.bridge.bridge-nf-call-ip6tables, value: "1" }
