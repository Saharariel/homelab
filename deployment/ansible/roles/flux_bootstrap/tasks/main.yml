---
- name: Install flux CLI
  ansible.builtin.shell:
    cmd: curl -s https://fluxcd.io/install.sh | bash
    creates: /usr/local/bin/flux

- name: Ensure flux-system namespace exists
  ansible.builtin.shell:
    cmd: k3s kubectl create namespace flux-system --dry-run=client -o yaml | k3s kubectl apply -f -
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }
  changed_when: false

- name: Inject ESO bootstrap credentials
  ansible.builtin.shell:
    cmd: >
      k3s kubectl -n flux-system create secret generic aws-eso-credentials
      --from-literal=access-key-id='{{ eso_aws_access_key_id }}'
      --from-literal=secret-access-key='{{ eso_aws_secret_access_key }}'
      --dry-run=client -o yaml | k3s kubectl apply -f -
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }
  no_log: true

- name: Protect ESO credentials from Flux pruning
  ansible.builtin.command:
    cmd: >
      k3s kubectl -n flux-system annotate secret aws-eso-credentials
      kustomize.toolkit.fluxcd.io/prune=disabled --overwrite
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }
  changed_when: false
  no_log: true

- name: Inject cluster parameters for Flux substitutions
  ansible.builtin.shell:
    cmd: >
      k3s kubectl -n flux-system create secret generic cluster-params
      --from-literal=BASE_DOMAIN='{{ base_domain }}'
      --from-literal=K3S_APISERVER_HOST='{{ k3s_apiserver_host }}'
      --from-literal=K3S_APISERVER_PORT='{{ k3s_apiserver_port }}'
      --from-literal=POD_CIDR='{{ pod_cidr }}'
      --dry-run=client -o yaml | k3s kubectl apply -f -
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }
  no_log: true

- name: Protect cluster parameters from Flux pruning
  ansible.builtin.command:
    cmd: >
      k3s kubectl -n flux-system annotate secret cluster-params
      kustomize.toolkit.fluxcd.io/prune=disabled --overwrite
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }
  changed_when: false
  no_log: true

- name: Inject base-path parameters for Flux substitutions
  ansible.builtin.shell:
    cmd: >
      k3s kubectl -n flux-system create secret generic base-path
      --from-literal=BASE_PATH='{{ cluster_base_path }}'
      --from-literal=NFS_SERVER='{{ cluster_nfs_server }}'
      --from-literal=NFS_ROOT='{{ cluster_nfs_root }}'
      --dry-run=client -o yaml | k3s kubectl apply -f -
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }

- name: Bootstrap Flux against the repo
  ansible.builtin.shell:
    cmd: |
      flux install
      flux create source git flux-system \
        --url={{ flux_git_url }} \
        --branch={{ flux_git_branch }} \
        --interval=1m
      flux create kustomization flux-system \
        --source=GitRepository/flux-system \
        --path={{ flux_git_path }} \
        --prune=true \
        --interval=10m
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }

- name: Wait for Flux to reconcile
  ansible.builtin.command: flux get kustomizations --no-header
  environment: { KUBECONFIG: /etc/rancher/k3s/k3s.yaml }
  changed_when: false
  register: flux_ks
  retries: 30
  delay: 20
  until: "'False' not in flux_ks.stdout"
