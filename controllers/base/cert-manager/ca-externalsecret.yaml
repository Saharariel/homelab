---
# Root CA (cert + key) pulled from the secret backend into the kubernetes.io/tls
# Secret that ca-issuer signs from.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homelab-ca-tls
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: homelab-ca-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ .tlscrt }}"
        tls.key: "{{ .tlskey }}"
        ca.crt: "{{ .tlscrt }}"
  data:
    - secretKey: tlscrt
      remoteRef:
        key: /homelab/cert-manager/HOMELAB_CA_TLS_CRT
    - secretKey: tlskey
      remoteRef:
        key: /homelab/cert-manager/HOMELAB_CA_TLS_KEY
