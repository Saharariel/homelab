---
# Persisted root CA (cert + key) pulled from AWS Parameter Store and rebuilt as
# the kubernetes.io/tls Secret that ca-issuer signs from. This is what makes the
# CA survive a cattle rebuild instead of cert-manager minting a fresh root.
#
# Store with:
#   aws ssm put-parameter --type SecureString --name /homelab/cert-manager/HOMELAB_CA_TLS_CRT --value "<tls.crt PEM>"
#   aws ssm put-parameter --type SecureString --name /homelab/cert-manager/HOMELAB_CA_TLS_KEY --value "<tls.key PEM>"
# ca.crt == tls.crt for a self-signed root.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homelab-ca-tls
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: homelab-ca-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ .tlscrt }}"
        tls.key: "{{ .tlskey }}"
        ca.crt: "{{ .tlscrt }}"
  data:
    - secretKey: tlscrt
      remoteRef:
        key: /homelab/cert-manager/HOMELAB_CA_TLS_CRT
    - secretKey: tlskey
      remoteRef:
        key: /homelab/cert-manager/HOMELAB_CA_TLS_KEY
