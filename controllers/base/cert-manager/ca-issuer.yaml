---
# Root CA issuer for *.homelab. The CA keypair (homelab-ca-tls) is NO LONGER
# generated by cert-manager — it is persisted in AWS Parameter Store and
# materialised by ESO (see ca-externalsecret.yaml), so a from-zero rebuild
# reuses the SAME root CA and every device that imported ca.crt stays trusted.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ca-issuer
spec:
  ca:
    secretName: homelab-ca-tls
