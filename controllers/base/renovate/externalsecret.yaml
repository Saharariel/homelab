apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: renovate-container-env
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: renovate-container-env
  data:
    - secretKey: RENOVATE_TOKEN
      remoteRef:
        key: /homelab/renovate/RENOVATE_TOKEN
