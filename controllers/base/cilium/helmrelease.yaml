apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  suspend: false
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    kubeProxyReplacement: false
    ipam:
      operator:
        clusterPoolIPv4PodCIDRList: "10.42.0.0/16"
    hubble:
      relay:
        enabled: true
      ui:
        enabled: true
      metrics:
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - httpV2
  # relay reaches agents at node-IP:4244; pod->node-IP is broken under Legacy
  # routing, so run relay host-net (chart has no hubble.relay.hostNetwork value)
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: hubble-relay
            patch: |
              - op: add
                path: /spec/template/spec/hostNetwork
                value: true
              - op: add
                path: /spec/template/spec/dnsPolicy
                value: ClusterFirstWithHostNet
