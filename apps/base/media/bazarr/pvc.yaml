apiVersion: v1
kind: PersistentVolume
metadata:
  name: bazarr-config
spec:
  capacity:
    storage: 5Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  # Local SSD on the worker (/var/lib/appconfig). nodeAffinity pins any pod
  # using this PVC to the worker — no per-deployment nodeSelector needed.
  local:
    path: /var/lib/appconfig/bazarr
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - worker-node-1
  claimRef:
    namespace: media
    name: bazarr-config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bazarr-config
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ""
  volumeName: bazarr-config
  resources:
    requests:
      storage: 5Gi
