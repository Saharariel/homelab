apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-config-nfs
spec:
  capacity:
    storage: 15Gi
  accessModes: ["ReadWriteMany"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
    - hard
    - noatime
  nfs:
    server: ${NFS_SERVER}
    path: ${NFS_ROOT}/jellyfin
  claimRef:
    namespace: media
    name: jellyfin-config-nfs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-nfs
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: ""
  volumeName: jellyfin-config-nfs
  resources:
    requests:
      storage: 15Gi
