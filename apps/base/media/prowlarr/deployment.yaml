apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
spec:
  replicas: 1
  strategy:
    type: Recreate   # single SQLite writer over NFS — never run two pods at once
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      containers:
        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:2.3.5

          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: DOTNET_SYSTEM_NET_SOCKETS_IPV6SUPPORT
              value: "0"
            - name: WEBUI_PORT
              value: "9696"

          securityContext:
            allowPrivilegeEscalation: false

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          ports:
            - containerPort: 9696
          volumeMounts:
            - name: media
              mountPath: /data
            - name: config
              mountPath: /config

        - name: flaresolverr
          image: flaresolverr/flaresolverr:v3.5.0
          env:
            - name: LOG_LEVEL
              value: info

          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          ports:
            - containerPort: 8191

      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media-data

        - name: config
          persistentVolumeClaim:
            claimName: prowlarr-config-nfs
