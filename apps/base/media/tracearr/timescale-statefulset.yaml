# TimescaleDB data lives on a static NFS PV (tank/k3s-pvcs/tracearr-timescale),
# migrated off Longhorn via pg_dump + timescaledb pre/post_restore. Regular
# volume (not volumeClaimTemplate) for a deterministic, rebuild-safe data path.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: tracearr-timescale-data-nfs
spec:
  capacity:
    storage: 10Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
    - hard
    - noatime
  nfs:
    server: ${NFS_SERVER}
    path: ${NFS_ROOT}/tracearr-timescale
  claimRef:
    namespace: media
    name: tracearr-timescale-data-nfs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tracearr-timescale-data-nfs
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ""
  volumeName: tracearr-timescale-data-nfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tracearr-timescale
  labels:
    app: tracearr-timescale
spec:
  serviceName: tracearr-timescale
  replicas: 1
  selector:
    matchLabels:
      app: tracearr-timescale
  template:
    metadata:
      labels:
        app: tracearr-timescale
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: timescale
          image: timescale/timescaledb-ha:pg18.3-ts2.25.2
          args:
            - postgres
            - -c
            - timescaledb.max_tuples_decompressed_per_dml_transaction=0
            - -c
            - max_locks_per_transaction=4096
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "tracearr"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tracearr-secret
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: "tracearr"
            - name: PGDATA
              value: "/home/postgres/pgdata/data"
          volumeMounts:
            - name: timescale-data
              mountPath: /home/postgres/pgdata
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - tracearr
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - tracearr
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
        - name: timescale-data
          persistentVolumeClaim:
            claimName: tracearr-timescale-data-nfs
