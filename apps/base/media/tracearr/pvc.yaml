apiVersion: v1
kind: PersistentVolume
metadata:
  name: tracearr-redis-data
spec:
  capacity:
    storage: 1Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  # Local SSD on the worker. Redis here is a regenerable cache — starts empty.
  local:
    path: /var/lib/appconfig/tracearr-redis
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - worker-node-1
  claimRef:
    namespace: media
    name: tracearr-redis-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tracearr-redis-data
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ""
  volumeName: tracearr-redis-data
  resources:
    requests:
      storage: 1Gi
