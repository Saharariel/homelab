apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vpn-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: vpn-creds
  data:
    - secretKey: username
      remoteRef:
        key: /homelab/qbittorrent/username
    - secretKey: password
      remoteRef:
        key: /homelab/qbittorrent/password
