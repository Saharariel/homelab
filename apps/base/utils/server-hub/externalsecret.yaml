apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: server-hub-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: server-hub-secret
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: /homelab/server-hub/SECRET_KEY
    - secretKey: AUTHENTIK_API_TOKEN
      remoteRef:
        key: /homelab/server-hub/AUTHENTIK_API_TOKEN
    - secretKey: AUTHENTIK_JELLYFIN_GROUP_ID
      remoteRef:
        key: /homelab/server-hub/AUTHENTIK_JELLYFIN_GROUP_ID
    - secretKey: AUTHENTIK_ENROLLMENT_FLOW_SLUG
      remoteRef:
        key: /homelab/server-hub/AUTHENTIK_ENROLLMENT_FLOW_SLUG
    - secretKey: JELLYFIN_API_KEY
      remoteRef:
        key: /homelab/server-hub/JELLYFIN_API_KEY
    # Cloudflare Access is OPTIONAL (perimeter access is managed manually in the email
    # policy). Uncomment these and add the matching Parameter Store entries only to
    # enable the read-only access column in the dashboard.
    # - secretKey: CF_API_TOKEN
    #   remoteRef:
    #     key: /homelab/server-hub/CF_API_TOKEN
    # - secretKey: CF_ACCOUNT_ID
    #   remoteRef:
    #     key: /homelab/server-hub/CF_ACCOUNT_ID
    # - secretKey: CF_ACCESS_POLICY_ID
    #   remoteRef:
    #     key: /homelab/server-hub/CF_ACCESS_POLICY_ID
