apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: serverhub-basic-auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: serverhub-basic-auth
  data:
    # htpasswd line(s), e.g. "admin:$apr1$...". Traefik basicAuth reads the `users` key.
    - secretKey: users
      remoteRef:
        key: /homelab/server-hub/basic-auth-htpasswd
