apiVersion: v1
kind: PersistentVolume
metadata:
  name: vaultwarden-data
spec:
  capacity:
    storage: 1Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  # Local SSD on the worker (/var/lib/appconfig). nodeAffinity pins the pod
  # to the worker — no per-workload nodeSelector needed.
  local:
    path: /var/lib/appconfig/vaultwarden
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - worker-node-1
  claimRef:
    namespace: utils
    name: vaultwarden-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vaultwarden-data
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ""
  volumeName: vaultwarden-data
  resources:
    requests:
      storage: 1Gi
