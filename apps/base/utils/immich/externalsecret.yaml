---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: immich-secret
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /homelab/immich/DB_PASSWORD
