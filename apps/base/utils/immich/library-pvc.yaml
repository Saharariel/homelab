---
# Photo library on tank/photos (NFS export). Static NFS PV so immich can run on
# any node (no hostPath, no node pinning). The Immich chart consumes it via
# existingClaim. RWX so immich-server + machine-learning can both mount it.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-library
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
    - hard
    - noatime
  claimRef:
    namespace: utils
    name: immich-library
  nfs:
    server: ${NFS_SERVER}
    path: ${BASE_PATH}/photos
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: immich-library
  resources:
    requests:
      storage: 2Ti
