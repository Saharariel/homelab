apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-ml-cache-nfs
spec:
  capacity:
    storage: 10Gi
  accessModes: ["ReadWriteMany"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
    - hard
    - noatime
  nfs:
    server: ${NFS_SERVER}
    path: ${NFS_ROOT}/immich-machine-learning
  claimRef:
    namespace: utils
    name: immich-ml-cache-nfs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-ml-cache-nfs
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: ""
  volumeName: immich-ml-cache-nfs
  resources:
    requests:
      storage: 10Gi
