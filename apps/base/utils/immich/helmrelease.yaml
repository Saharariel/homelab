---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 30m
  chart:
    spec:
      chart: immich
      version: "0.12.0"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: utils
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Shared base merged into every component (server + machine-learning).
    controllers:
      main:
        containers:
          main:
            image:
              tag: v2.7.5
            env:
              # Database connection to the self-managed Postgres StatefulSet.
              DB_HOSTNAME: immich-postgres
              DB_USERNAME: immich
              DB_DATABASE_NAME: immich
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-secret
                    key: DB_PASSWORD
              # REDIS_HOSTNAME ({release}-valkey) and IMMICH_MACHINE_LEARNING_URL
              # keep their chart defaults.
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi

    immich:
      persistence:
        library:
          existingClaim: immich-library

    # Bundled Redis-compatible cache (disabled by default in this chart).
    valkey:
      enabled: true

    server:
      enabled: true
      # Pin to the worker because the library hostPath PV lives on /tank there.
      defaultPodOptions:
        nodeSelector:
          kubernetes.io/hostname: worker-node-1
      ingress:
        main:
          enabled: true
          className: traefik
          annotations:
            cert-manager.io/cluster-issuer: ca-issuer
            # HTTPS only: bind the router to websecure (443), no port 80.
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            nginx.ingress.kubernetes.io/proxy-body-size: "0"
          hosts:
            - host: immich.homelab
              paths:
                - path: /
                  service:
                    identifier: main
          tls:
            - hosts:
                - immich.homelab
              secretName: immich-tls

    machine-learning:
      enabled: true
      persistence:
        # Persist downloaded ML models so they survive pod restarts.
        # Re-downloadable model files: replicated for availability but excluded
        # from the weekly S3 backup (longhorn-no-backup has no recurringJobSelector).
        cache:
          enabled: true
          # Static NFS PV (tank/k3s-pvcs/immich-machine-learning); models are
          # re-downloadable, so this is just a regenerable cache on NFS.
          existingClaim: immich-ml-cache-nfs
