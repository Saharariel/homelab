apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wikijs-postgres-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: wikijs-postgres-secret
  data:
    - secretKey: postgresql-password
      remoteRef:
        key: /homelab/wikijs/postgresql-password
