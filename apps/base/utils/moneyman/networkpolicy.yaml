apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: moneyman
spec:
  endpointSelector:
    matchLabels:
      app: moneyman
  # Egress default-deny: only DNS + outbound HTTPS allowed.
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
