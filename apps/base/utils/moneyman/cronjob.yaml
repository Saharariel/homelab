apiVersion: batch/v1
kind: CronJob
metadata:
  name: moneyman
spec:
  schedule: "0 7 * * *" # 7am daily
  timeZone: Asia/Jerusalem
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: moneyman
        spec:
          restartPolicy: OnFailure
          serviceAccountName: moneyman
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: moneyman
              # Pinned by digest so a re-pushed tag can't swap the image.
              image: ghcr.io/daniel-hauser/moneyman:v2026.06.14.1@sha256:7378b5818940052bba5af4292147bb0a358e2f0589e896eb0b3c5260cf5ff1db
              imagePullPolicy: IfNotPresent

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL

              resources:
                requests:
                  memory: "512Mi"
                  cpu: "200m"
                limits:
                  memory: "1Gi"

              env:
                - name: TZ
                  value: Asia/Jerusalem
                - name: HOME
                  value: /tmp
                # Read config from a file, keeping the secret out of the env.
                - name: MONEYMAN_CONFIG_PATH
                  value: /secrets/config.json

              volumeMounts:
                - name: config
                  mountPath: /secrets
                  readOnly: true
                - name: tmp
                  mountPath: /tmp

          volumes:
            - name: config
              csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: moneyman-config
            - name: tmp
              emptyDir: {}
