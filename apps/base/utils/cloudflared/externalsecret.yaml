apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tunnel-token
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: tunnel-token
  data:
    - secretKey: token
      remoteRef:
        key: /homelab/cloudflared/token
