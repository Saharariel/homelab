apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blackbox-exporter
spec:
  interval: 5m
  chart:
    spec:
      chart: prometheus-blackbox-exporter
      version: "11.13.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  values:
    fullnameOverride: blackbox-exporter
    # Co-locate with Prometheus on the control plane (worker is RAM-starved).
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    resources:
      requests:
        cpu: 10m
        memory: 24Mi
      limits:
        memory: 64Mi
    serviceMonitor:
      enabled: false
    config:
      modules:
        # A reachable web app may redirect to a login/web root (302/307) or sit
        # behind forward-auth (401/403); following redirects lands most on a 200.
        # All of these still mean "the service is up".
        homelab_http:
          prober: http
          timeout: 5s
          http:
            valid_status_codes: [200, 204, 301, 302, 307, 308, 401, 403]
            follow_redirects: true
            preferred_ip_protocol: ip4
        homelab_tcp:
          prober: tcp
          timeout: 5s
          tcp:
            preferred_ip_protocol: ip4
