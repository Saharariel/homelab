apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-discord
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: alertmanager-discord
  data:
    # Same Discord webhook the Flux notification-controller already uses.
    - secretKey: address
      remoteRef:
        key: /homelab/discord-alerts/address
