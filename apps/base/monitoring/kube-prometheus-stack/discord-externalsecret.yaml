apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    # Render the complete alertmanager.yaml with the Discord webhook injected, so
    # the URL stays in AWS param store and never in git. Consumed by the
    # Alertmanager CR via alertmanagerSpec.configSecret (see values.yaml).
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          route:
            group_by: ["alertname", "namespace"]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            receiver: discord
            routes:
              # Watchdog is the always-firing heartbeat and InfoInhibitor is
              # noise; keep both out of Discord.
              - receiver: "null"
                matchers:
                  - alertname = "Watchdog"
              - receiver: "null"
                matchers:
                  - alertname = "InfoInhibitor"
              # Send actionable alerts to Hermes for automatic read-only
              # investigation while continuing to Discord for human visibility.
              - receiver: hermes-webhook
                matchers:
                  - hermes_triage = "true"
                continue: true
              # Info-severity alerts (e.g. CPUThrottlingHigh) are not actionable
              # pages; drop them. Only warning/critical reach Discord.
              - receiver: "null"
                matchers:
                  - severity = "info"
              # Keep actionable alerts going to Discord even when an earlier
              # Hermes route matched with continue: true.
              - receiver: discord
                matchers:
                  - severity =~ "warning|critical"
          receivers:
            - name: "null"
            - name: hermes-webhook
              webhook_configs:
                - url: http://192.168.50.18:8787/alertmanager
                  send_resolved: false
            - name: discord
              discord_configs:
                - webhook_url: "{{ .webhookUrl }}"
                  send_resolved: true
          inhibit_rules:
            # Don't page on a warning when the matching critical already fires.
            - source_matchers:
                - severity = "critical"
              target_matchers:
                - severity = "warning"
              equal: ["alertname", "namespace"]
  data:
    # Same Discord webhook the Flux notification-controller already uses.
    - secretKey: webhookUrl
      remoteRef:
        key: /homelab/discord-alerts/address
