fullnameOverride: prometheus

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

alertmanager:
  fullnameOverride: alertmanager
  enabled: true
  ingress:
    enabled: false
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  alertmanagerSpec:
    # Bump past the chart-default v0.25.0 for discord_configs webhook_url_file +
    # title/message templating (added in v0.26).
    image:
      tag: v0.27.0
    # Mounts secret alertmanager-discord at /etc/alertmanager/secrets/<name>/.
    secrets:
      - alertmanager-discord
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: discord
      routes:
        # Watchdog always fires (it's the dead-man's-switch heartbeat) and
        # InfoInhibitor is noise; keep both out of Discord.
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
        - receiver: "null"
          matchers:
            - alertname = "InfoInhibitor"
    receivers:
      - name: "null"
      - name: discord
        discord_configs:
          - webhook_url_file: /etc/alertmanager/secrets/alertmanager-discord/address
            send_resolved: true
            title: >-
              {{ if eq .Status "firing" }}🔥 FIRING{{ else }}✅ RESOLVED{{ end }} ·
              {{ .CommonLabels.alertname }}
            message: |-
              {{ range .Alerts }}**{{ .Labels.alertname }}** ({{ .Labels.severity }})
              {{ .Annotations.summary }}{{ if .Annotations.description }}
              {{ .Annotations.description }}{{ end }}
              {{ if .Labels.instance }}instance: `{{ .Labels.instance }}` {{ end }}{{ if .Labels.namespace }}· ns: `{{ .Labels.namespace }}`{{ end }}
              {{ end }}
    inhibit_rules:
      # Don't page on a warning when the matching critical is already firing.
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ["alertname", "namespace"]

grafana:
  enabled: true
  fullnameOverride: grafana
  forceDeployDatasources: false
  forceDeployDashboards: false
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: utc
  service:
    port: 80
    targetPort: 3000
  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      cert-manager.io/cluster-issuer: ca-issuer
    hosts:
      - grafana.homelab
    path: /
    pathType: Prefix
    tls:
      - hosts:
          - grafana.homelab
        secretName: grafana-homelab-tls
  serviceMonitor:
    enabled: true
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"

kubeApiServer:
  enabled: true

kubelet:
  enabled: true
  serviceMonitor:
    metricRelabelings:
      - action: replace
        sourceLabels:
          - node
        targetLabel: instance

kubeControllerManager:
  # Disabled: k3s binds this on 127.0.0.1 and k8s 1.33 rejects loopback IPs in
  # the chart-managed Endpoints. Re-add via additionalScrapeConfigs if needed.
  enabled: false

coreDns:
  enabled: true

kubeDns:
  enabled: false

kubeEtcd:
  # Disabled: see kubeControllerManager note (loopback Endpoints rejected by 1.33).
  enabled: false

kubeScheduler:
  # Disabled: see kubeControllerManager note (loopback Endpoints rejected by 1.33).
  enabled: false

kubeProxy:
  # Disabled: see kubeControllerManager note (loopback Endpoints rejected by 1.33).
  enabled: false

kubeStateMetrics:
  enabled: true

kube-state-metrics:
  fullnameOverride: kube-state-metrics
  selfMonitor:
    enabled: true
  prometheus:
    monitor:
      enabled: true
      relabelings:
        - action: replace
          regex: (.*)
          replacement: $1
          sourceLabels:
            - __meta_kubernetes_pod_node_name
          targetLabel: kubernetes_node

nodeExporter:
  enabled: true
  serviceMonitor:
    relabelings:
      - action: replace
        regex: (.*)
        replacement: $1
        sourceLabels:
          - __meta_kubernetes_pod_node_name
        targetLabel: kubernetes_node

prometheus-node-exporter:
  fullnameOverride: node-exporter
  podLabels:
    jobLabel: node-exporter
  extraArgs:
    - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
    - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$
  service:
    portName: http-metrics
  prometheus:
    monitor:
      enabled: true
      relabelings:
        - action: replace
          regex: (.*)
          replacement: $1
          sourceLabels:
            - __meta_kubernetes_pod_node_name
          targetLabel: kubernetes_node
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 2048Mi

prometheusOperator:
  enabled: true
  prometheusConfigReloader:
    resources:
      requests:
        cpu: 200m
        memory: 50Mi
      limits:
        memory: 100Mi

prometheus:
  enabled: true
  prometheusSpec:
    replicas: 1
    replicaExternalLabelName: "replica"
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    retention: 6h
    enableAdminAPI: true
    walCompression: true
    scrapeInterval: 30s
    evaluationInterval: 30s
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    # host-net so scrapes are host->host (pod->node-IP broken under Cilium Legacy)
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    # zfs_exporter runs as a systemd unit on the Proxmox desktop host (port 9134);
    # Server Hub reads these dataset metrics through its Prometheus adapter.
    additionalScrapeConfigs:
      - job_name: zfs-proxmox
        static_configs:
          - targets: ["192.168.50.10:9134"]
            labels:
              node: homelab

thanosRuler:
  enabled: false
