apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: authentik-secret
  data:
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef:
        key: /homelab/authentik/AUTHENTIK_SECRET_KEY
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: /homelab/authentik/POSTGRES_PASSWORD
    # Bitnami PG superuser pw — pinned (not chart-generated) so a rebuild's fresh
    # chart uses the same value baked into the restored DB. Closes rebuild gap #1.
    - secretKey: POSTGRES_SUPERUSER_PASSWORD
      remoteRef:
        key: /homelab/authentik/POSTGRES_SUPERUSER_PASSWORD
